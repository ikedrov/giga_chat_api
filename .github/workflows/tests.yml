name: Tests & Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ALLURE_VERSION: "2.30.0"

jobs:
  run_tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file from secrets
        run: |
          echo "GIGACHAT_AUTH_URL=${{ secrets.GIGACHAT_AUTH_URL }}" >> .env
          echo "GIGACHAT_AUTH_KEY=${{ secrets.GIGACHAT_AUTH_KEY }}" >> .env
          echo "GIGACHAT_RQUID=${{ secrets.GIGACHAT_RQUID }}" >> .env
          echo "GIGACHAT_API_URL=${{ secrets.GIGACHAT_API_URL }}" >> .env
          echo "GIGACHAT_SCOPE=${{ secrets.GIGACHAT_SCOPE }}" >> .env

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --alluredir=allure-results \
            --clean-alluredir \
            -v \
            --tb=short \
            || true

      - name: Upload allure-results & logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: |
            allure-results/
            logs/
          retention-days: 7

  generate_report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: run_tests
    if: always()
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download allure-results artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Checkout gh-pages for history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure history from previous deploy
        continue-on-error: true
        run: |
          if [ -d gh-pages/history ]; then
            echo "Копируем историю из предыдущего деплоя..."
            cp -r gh-pages/history allure-results/history
          else
            echo "История не найдена, пропускаем."
          fi

      - name: Install Allure CLI
        run: |
          wget -q "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.zip"
          unzip -q "allure-${ALLURE_VERSION}.zip" -d /opt/
          ln -s "/opt/allure-${ALLURE_VERSION}/bin/allure" /usr/local/bin/allure
          allure --version

      - name: Generate Allure report
        run: |
          allure generate allure-results -o public --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          keep_files: false

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: public/
          retention-days: 30
